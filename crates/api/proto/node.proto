syntax = "proto3";

package lycoris.daemon;

service Cluster {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc SetPrimaryEndpoint(SetPrimaryEndpointRequest) returns (SetPrimaryEndpointResponse);
}

service Sync {
  rpc SyncNodes(SyncNodesRequest) returns (SyncNodesResponse);
  rpc PushNode(PushNodeRequest) returns (PushNodeResponse);
}

message NodeInfo {
  string id = 1;
  string address = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
  int64 last_heartbeat_unix_ms = 5;
  string state = 6;
  uint64 incarnation = 7;
  uint64 heartbeat = 8;
}

message MerkleRootRequest {}

message MerkleRootResponse {
  bytes root_hash = 1;
  repeated LeafHash leaf_hashes = 2;
}

message LeafHash {
  string node_id = 1;
  bytes hash = 2;
}

message FetchRegistersRequest {
  repeated string node_ids = 1;
}

message FetchRegistersResponse {
  repeated NodeInfo registers = 1;
}

message PushRegistersRequest {
  repeated NodeInfo registers = 1;
}

message ProbeRequest {
  uint64 seq = 1;
  string target = 2;
}

message ProbeResponse {
  bool ack = 1;
  uint64 seq = 2;
}

service Membership {
  rpc MerkleRoot(MerkleRootRequest) returns (MerkleRootResponse);
  rpc FetchRegisters(FetchRegistersRequest) returns (FetchRegistersResponse);
  rpc PushRegisters(PushRegistersRequest) returns (FetchRegistersResponse);
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc Gossip(GossipMessage) returns (GossipResponse);
}

message GossipMessage {
  oneof payload {
    NodeInfo alive = 1;
    SuspectMessage suspect = 2;
    LeaveMessage leave = 3;
  }
}

message SuspectMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message LeaveMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message GossipResponse {
  bool accepted = 1;
}

message RegisterRequest {
  NodeInfo info = 1;
}

message RegisterResponse {
  bool accepted = 1;
  string reason = 2;
}

message HeartbeatRequest {
  string node_id = 1;
  NodeInfo info = 2;
}

message HeartbeatResponse {
  bool accepted = 1;
  string reason = 2;
}

message ListNodesRequest {
  // Optional label selector. Empty means "all alive nodes".
  map<string, string> selector = 1;
}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message SyncNodesRequest {
  repeated NodeInfo nodes = 1;
}

message SyncNodesResponse {
  repeated NodeInfo nodes = 1;
}

message PushNodeRequest {
  NodeInfo info = 1;
  string origin_node_id = 2;
  uint64 sequence = 3;
}

message PushNodeResponse {
  bool accepted = 1;
}

message SetPrimaryEndpointRequest {
  string address = 1;
}

message SetPrimaryEndpointResponse {
  bool accepted = 1;
  string reason = 2;
}
