syntax = "proto3";

package lycoris.daemon;

service Cluster {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SetPrimaryEndpoint(SetPrimaryEndpointRequest) returns (SetPrimaryEndpointResponse);
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Leave(LeaveRequest) returns (LeaveResponse);
  rpc GetOutDegree(GetOutDegreeRequest) returns (GetOutDegreeResponse);

  // Generic resource API.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc GetResource(GetResourceRequest) returns (Resource);
  rpc DescribeResource(DescribeResourceRequest) returns (Resource);
}

enum ResourceKind {
  NODE = 0;
  SESSION = 1;
  MEMORY = 2;
  SKILL = 3;
  RULE = 4;
  WORKSPACE = 5;
}

message ResourceMetadata {
  string id = 1;
  string name = 2;
  ResourceKind kind = 3;
  map<string, string> labels = 4;
  map<string, string> annotations = 5;
  // "shared", "local", or empty.
  string scope = 6;
  // Origin node for shared resources; empty for local origin.
  string source_node_id = 7;
  int64 created_at_ms = 8;
  int64 updated_at_ms = 9;
}

message NodeBody {
  NodeInfo node = 1;
}

message SessionBody {
  string title = 1;
  string host_node_id = 2;
  map<string, string> metadata = 3;
}

message MemoryBody {
  bytes content = 1;
  map<string, string> metadata = 2;
  string scope = 3;
  string source_node_id = 4;
  int64 updated_at_ms = 5;
  string content_hash = 6;
  repeated float embedding = 7;
  uint64 version = 8;
}

message SkillBody {
  uint64 version = 1;
  string content_hash = 2;
  string content = 3;
  map<string, string> metadata = 4;
}

message RuleBody {
  uint64 version = 1;
  string content_hash = 2;
  string content = 3;
  map<string, string> metadata = 4;
}

message WorkspaceBody {
  string root = 1;
  repeated string session_ids = 2;
  map<string, string> metadata = 3;
  string scope = 4;
  string source_node_id = 5;
  uint64 version = 6;
  string content_hash = 7;
}

message Resource {
  ResourceMetadata metadata = 1;
  oneof body {
    NodeBody node = 2;
    SessionBody session = 3;
    MemoryBody memory = 4;
    SkillBody skill = 5;
    RuleBody rule = 6;
    WorkspaceBody workspace = 7;
  }
}

message ListResourcesRequest {
  ResourceKind kind = 1;
  map<string, string> selector = 2;
  string scope = 3;
}

message ListResourcesResponse {
  repeated Resource resources = 1;
}

message GetResourceRequest {
  ResourceKind kind = 1;
  string id = 2;
}

message DescribeResourceRequest {
  ResourceKind kind = 1;
  string id = 2;
}

message NodeInfo {
  string id = 1;
  string address = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
  int64 last_heartbeat_unix_ms = 5;
  string state = 6;
  uint64 incarnation = 7;
  uint64 heartbeat = 8;
  repeated string in_degree = 9;
  repeated string out_degree = 10;
}

message GetOutDegreeRequest {}

message GetOutDegreeResponse {
  string node_id = 1;
  string address = 2;
}

message MerkleRootRequest {}

message MerkleRootResponse {
  bytes root_hash = 1;
}

message MerkleNodeRef {
  uint32 depth = 1;
  uint64 index = 2;
}

message MerkleLeafEntry {
  string node_id = 1;
  bytes hash = 2;
}

message MerkleNodeResult {
  MerkleNodeRef node = 1;
  bytes hash = 2;
  bool is_leaf = 3;
  repeated MerkleLeafEntry entries = 4;
}

message MerkleNodesRequest {
  repeated MerkleNodeRef nodes = 1;
}

message MerkleNodesResponse {
  repeated MerkleNodeResult results = 1;
}

message FetchRegistersRequest {
  repeated string node_ids = 1;
}

message FetchRegistersResponse {
  repeated NodeInfo registers = 1;
}

message PushRegistersRequest {
  repeated NodeInfo registers = 1;
}

message ProbeRequest {
  uint64 seq = 1;
  string target = 2;
}

message ProbeResponse {
  bool ack = 1;
  uint64 seq = 2;
}

service Membership {
  rpc MerkleRoot(MerkleRootRequest) returns (MerkleRootResponse);
  rpc MerkleNodes(MerkleNodesRequest) returns (MerkleNodesResponse);
  rpc FetchRegisters(FetchRegistersRequest) returns (FetchRegistersResponse);
  rpc PushRegisters(PushRegistersRequest) returns (FetchRegistersResponse);
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc State(StateMessage) returns (StateResponse);
}

service Sync {
  rpc SyncNodes(SyncNodesRequest) returns (SyncNodesResponse);
  rpc PushNode(PushNodeRequest) returns (PushNodeResponse);
  rpc SyncResources(SyncResourcesRequest) returns (SyncResourcesResponse);
}

message SyncResourcesRequest {
  repeated Resource resources = 1;
}

message SyncResourcesResponse {
  repeated Resource resources = 1;
}

message StateMessage {
  oneof payload {
    NodeInfo alive = 1;
    SuspectMessage suspect = 2;
    LeaveMessage leave = 3;
  }
}

message SuspectMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message LeaveMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message StateResponse {
  bool accepted = 1;
}

message RegisterRequest {
  NodeInfo info = 1;
  string cluster_key = 2;
}

message RegisterResponse {
  bool accepted = 1;
  string reason = 2;
}

message SyncNodesRequest {
  repeated NodeInfo nodes = 1;
}

message SyncNodesResponse {
  repeated NodeInfo nodes = 1;
}

message PushNodeRequest {
  NodeInfo info = 1;
  string origin_node_id = 2;
  uint64 sequence = 3;
}

message PushNodeResponse {
  bool accepted = 1;
}

message SetPrimaryEndpointRequest {
  string address = 1;
}

message SetPrimaryEndpointResponse {
  bool accepted = 1;
  string reason = 2;
}

message JoinRequest {
  NodeInfo info = 1;
  string cluster_key = 2;
}

message JoinResponse {
  bool accepted = 1;
  string reason = 2;
}

message LeaveRequest {
  string node_id = 1;
}

message LeaveResponse {
  bool accepted = 1;
  string reason = 2;
}
