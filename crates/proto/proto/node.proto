syntax = "proto3";

package lycoris.daemon;

service Cluster {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SetPrimaryEndpoint(SetPrimaryEndpointRequest) returns (SetPrimaryEndpointResponse);
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Leave(LeaveRequest) returns (LeaveResponse);

  // Generic resource API.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc GetResource(GetResourceRequest) returns (Resource);
}

enum ResourceKind {
  NODE = 0;
  SESSION = 1;
  MEMORY = 2;
  SKILL = 3;
  RULE = 4;
  WORKSPACE = 5;
  EXTENSION = 6;
}

// Lifecycle state of a cluster member, mirroring the membership CRDT's
// MemberState. UNSPECIFIED never appears in registers emitted by a daemon.
enum NodeState {
  NODE_STATE_UNSPECIFIED = 0;
  NODE_STATE_ACTIVE = 1;
  NODE_STATE_SUSPECTED = 2;
  NODE_STATE_OFFLINE = 3;
  NODE_STATE_LEAVING = 4;
}

// Visibility scope of a resource. Cluster-shared resources participate in
// resource anti-entropy; node-local resources never leave their origin node.
enum ResourceScope {
  RESOURCE_SCOPE_UNSPECIFIED = 0;
  RESOURCE_SCOPE_CLUSTER_SHARED = 1;
  RESOURCE_SCOPE_NODE_LOCAL = 2;
}

message ResourceMetadata {
  string id = 1;
  string name = 2;
  ResourceKind kind = 3;
  map<string, string> labels = 4;
  map<string, string> annotations = 5;
  // The single copy of the resource scope; UNSPECIFIED for resources that
  // are not scoped (nodes, sessions).
  ResourceScope scope = 6;
  // Origin node for shared resources; empty for local origin.
  string source_node_id = 7;
  int64 created_at_ms = 8;
  int64 updated_at_ms = 9;
}

// The NodeInfo payload is the single copy of a node resource's id, labels,
// and annotations; the enclosing ResourceMetadata only carries the generic
// scaffold (id/name/kind/timestamps).
message NodeBody {
  NodeInfo node = 1;
}

message SessionBody {
  string title = 1;
  string host_node_id = 2;
  map<string, string> metadata = 3;
}

// Scope, source node, and update time live on ResourceMetadata only; bodies
// carry kind-specific payloads.
message MemoryBody {
  bytes content = 1;
  map<string, string> metadata = 2;
  string content_hash = 3;
  repeated float embedding = 4;
  uint64 version = 5;
}

message SkillBody {
  uint64 version = 1;
  string content_hash = 2;
  string content = 3;
  map<string, string> metadata = 4;
}

message RuleBody {
  uint64 version = 1;
  string content_hash = 2;
  string content = 3;
  map<string, string> metadata = 4;
}

message WorkspaceBody {
  string root = 1;
  repeated string session_ids = 2;
  map<string, string> metadata = 3;
  uint64 version = 4;
  string content_hash = 5;
}

// An extension package: the executable artifact plus its manifest (extension system
// design, section 4). `version` is the monotonic convergence version ordered
// by anti-entropy; `content_hash` is the blake3 hex digest of `artifact`,
// verified at ingest. `engine` is "wasm" or "lua"; `entry` is the exported
// entry point ("invoke" unless overridden).
//
// `manifest` carries everything else as string keys with JSON values:
// `semver` (human-facing SemVer string), `capabilities` (JSON array of
// capability names), `hooks` (JSON array of hook points), `selector` (JSON
// map of label terms deciding per-node activation) and `settings` (opaque
// JSON passed to the extension uninterpreted). Unknown keys are ignored so
// newer manifests stay readable by older nodes.
message ExtensionBody {
  uint64 version = 1;
  string content_hash = 2;
  string engine = 3;
  string entry = 4;
  bytes artifact = 5;
  map<string, string> manifest = 6;
}

message Resource {
  ResourceMetadata metadata = 1;
  oneof body {
    NodeBody node = 2;
    SessionBody session = 3;
    MemoryBody memory = 4;
    SkillBody skill = 5;
    RuleBody rule = 6;
    WorkspaceBody workspace = 7;
    ExtensionBody extension = 8;
  }
}

message ListResourcesRequest {
  ResourceKind kind = 1;
  map<string, string> selector = 2;
  // Optional scope filter; UNSPECIFIED lists resources of every scope.
  ResourceScope scope = 3;
}

message ListResourcesResponse {
  repeated Resource resources = 1;
}

message GetResourceRequest {
  ResourceKind kind = 1;
  string id = 2;
}

message NodeInfo {
  string id = 1;
  string address = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
  int64 last_heartbeat_unix_ms = 5;
  NodeState state = 6;
  uint64 incarnation = 7;
  uint64 heartbeat = 8;
}

message MerkleRootRequest {}

message MerkleRootResponse {
  bytes root_hash = 1;
}

message MerkleNodeRef {
  uint32 depth = 1;
  uint64 index = 2;
}

message MerkleLeafEntry {
  string node_id = 1;
  bytes hash = 2;
}

message MerkleNodeResult {
  MerkleNodeRef node = 1;
  bytes hash = 2;
  // Leaf entries are present exactly when `node` references the leaf depth;
  // the receiver derives leaf-ness from the depth, not from a flag.
  repeated MerkleLeafEntry entries = 3;
}

message MerkleNodesRequest {
  repeated MerkleNodeRef nodes = 1;
}

message MerkleNodesResponse {
  repeated MerkleNodeResult results = 1;
}

message FetchRegistersRequest {
  repeated string node_ids = 1;
}

message FetchRegistersResponse {
  repeated NodeInfo registers = 1;
}

message PushRegistersRequest {
  repeated NodeInfo registers = 1;
}

message PushRegistersResponse {}

message ProbeRequest {
  uint64 seq = 1;
  string target = 2;
}

message ProbeResponse {
  bool ack = 1;
  uint64 seq = 2;
}

service Membership {
  rpc MerkleRoot(MerkleRootRequest) returns (MerkleRootResponse);
  rpc MerkleNodes(MerkleNodesRequest) returns (MerkleNodesResponse);
  rpc FetchRegisters(FetchRegistersRequest) returns (FetchRegistersResponse);
  rpc PushRegisters(PushRegistersRequest) returns (PushRegistersResponse);
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc State(StateMessage) returns (StateResponse);
}

service Sync {
  rpc SyncNodes(SyncNodesRequest) returns (SyncNodesResponse);
  // Gossip channel for register (Alive) updates, including Offline registers
  // which ride the Alive path so that partitions can heal on reconnect.
  // (origin_node_id, sequence) is the receiver-side dedup key.
  rpc PushNode(PushNodeRequest) returns (PushNodeResponse);
  rpc SyncResources(SyncResourcesRequest) returns (SyncResourcesResponse);
}

message SyncResourcesRequest {
  repeated Resource resources = 1;
}

message SyncResourcesResponse {
  repeated Resource resources = 1;
}

// SWIM state rumors gossiped between nodes. Register-carrying Alive updates
// (including Offline registers) travel on `Sync.PushNode` instead; this
// channel carries only the register-less Suspect and Leave rumors.
message StateMessage {
  oneof payload {
    SuspectMessage suspect = 1;
    LeaveMessage leave = 2;
  }
}

message SuspectMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message LeaveMessage {
  string node_id = 1;
  uint64 incarnation = 2;
}

message StateResponse {
  bool accepted = 1;
}

message RegisterRequest {
  NodeInfo info = 1;
}

message RegisterResponse {
  bool accepted = 1;
  string reason = 2;
}

message SyncNodesRequest {
  repeated NodeInfo nodes = 1;
}

message SyncNodesResponse {
  repeated NodeInfo nodes = 1;
}

message PushNodeRequest {
  NodeInfo info = 1;
  string origin_node_id = 2;
  uint64 sequence = 3;
}

message PushNodeResponse {
  bool accepted = 1;
}

message SetPrimaryEndpointRequest {
  string address = 1;
}

message SetPrimaryEndpointResponse {
  bool accepted = 1;
  string reason = 2;
}

message JoinRequest {
  NodeInfo info = 1;
}

message JoinResponse {
  bool accepted = 1;
  string reason = 2;
}

message LeaveRequest {
  string node_id = 1;
}

message LeaveResponse {
  bool accepted = 1;
  string reason = 2;
}

// Extension invocation (extension system design, section 7). Sits behind the
// cluster-key interceptor like `Cluster`: invoking an extension is an
// admission-level operation, and forwarded calls present the forwarding
// daemon's own cluster key.
service Extension {
  rpc Invoke(ExtensionInvokeRequest) returns (ExtensionInvokeResponse);
}

message ExtensionInvokeRequest {
  string extension_id = 1;
  string method = 2;
  // JSON bytes, validated by the serving node before the call reaches an
  // engine.
  bytes payload = 3;
  // Empty for a direct call. Non-empty marks a forwarded call and carries the
  // forwarding node's id: the receiving node executes locally and never
  // re-forwards (hop limit 1).
  string origin_node_id = 4;
}

message ExtensionInvokeResponse {
  // JSON bytes produced by the extension.
  bytes payload = 1;
  // Id of the node that actually executed the call (the serving node for a
  // direct call, the capable peer for a forwarded one).
  string executed_by = 2;
}
