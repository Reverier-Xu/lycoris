# Canned OpenAI-compatible API for the shell e2e WASM provider scenario
# (llm-provider design, section 7): every POST to /v1/chat/completions
# answers the same fixed completion, so the cluster run never needs a real
# API key. Mounted into the nginx container as /etc/nginx/conf.d/default.conf
# by e2e/shell-test.sh.
server {
    listen 80;

    location = /v1/chat/completions {
        default_type application/json;
        return 200 '{"id":"chatcmpl-mock","object":"chat.completion","created":1700000000,"model":"gpt-mock","choices":[{"index":0,"message":{"role":"assistant","content":"canned hello"},"finish_reason":"stop"}],"usage":{"prompt_tokens":5,"completion_tokens":2,"total_tokens":7}}';
    }

    location = /v1/models {
        default_type application/json;
        return 200 '{"object":"list","data":[{"id":"gpt-mock","object":"model","created":1700000000,"owned_by":"e2e"}]}';
    }
}
