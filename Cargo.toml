[workspace]
members  = ["crates/*"]
resolver = "3"

[workspace.package]
authors      = ["Reverier-Xu <reverier.xu@woooo.tech>"]
description  = "..."
edition      = "2024"
homepage     = "https://lycoris.woooo.tech"
license      = "MPL-2.0"
readme       = "README.md"
repository   = "https://github.com/Reverier-Xu/lycoris"
rust-version = "1.96"
version      = "0.1.0"

[profile.release]
codegen-units = 1
lto           = "thin"
opt-level     = "z"
strip         = true

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
anyhow        = "1.0"
clap          = "4.6"
dashmap       = "6.1"
directories   = "6.0"
is-root       = "0.1.3"
lycoris-api    = { path = "crates/api" }
lycoris-config = { path = "crates/config" }
owo-colors    = "4.3"
prost         = "0.13"
rcgen         = "0.13"
rusqlite      = { version = "0.34", features = ["bundled"] }
rustls        = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pemfile = "2.2"
serde         = { version = "1.0", features = ["derive"] }
tempfile      = "3.27"
thiserror     = "2.0"
tokio         = { version = "1.52", features = ["full"] }
tokio-rustls  = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }
toml          = "0.8"
tonic         = { version = "0.13", features = ["tls-ring"] }
tonic-build   = "0.13"
tracing       = "0.1"
tracing-subscriber = "0.3"
