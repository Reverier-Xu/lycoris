name: quality_check

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            timeout_minutes: 45
          - os: macos-latest
            timeout_minutes: 60
          - os: windows-latest
            timeout_minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: install stable rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets --locked

      - name: cargo fmt
        run: cargo +nightly fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --lib --tests --locked

  musl-e2e:
    name: musl build & e2e (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install stable rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: build static musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p lycoris --locked

      - name: smoke-run static binary
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/lycoris
          file "$BIN"
          "$BIN" --help
          "$BIN" daemon --help
          "$BIN" cluster --help

      - name: run docker e2e suite
        run: ./e2e/run.sh
